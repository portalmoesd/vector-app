databases:
  - name: vector-portal-db
    plan: free
    databaseName: vector_portal
    user: vector

services:
  - type: web
    name: vector-portal
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vector-portal-db
          property: connectionString
      - key: DATABASE_SSL_MODE
        value: require
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_DEFAULT_SEED_USERS
        value: "false"
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info
      - key: GEOSTAT_TLS_MODE
        value: no-verify
      - key: STORAGE_BACKEND
        value: database
