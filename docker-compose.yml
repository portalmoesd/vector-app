services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://vector:vector@db:5432/vector_portal
      DATABASE_SSL_MODE: disable
      DATABASE_POOL_MAX: 20
      DATABASE_IDLE_TIMEOUT_MS: 30000
      DATABASE_CONNECTION_TIMEOUT_MS: 10000
      JWT_SECRET: replace-this-with-a-long-random-secret-before-use
      CORS_ORIGINS: http://localhost:3000
      ALLOW_DEFAULT_SEED_USERS: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vector_portal
      POSTGRES_USER: vector
      POSTGRES_PASSWORD: vector
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector -d vector_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
