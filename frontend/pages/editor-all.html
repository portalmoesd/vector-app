<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — All Sections</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <link rel="stylesheet" href="/css/editor.css" />
  <style>
    /* ── Sticky section navigation ──────────────────────────────────────────── */
    .section-nav {
      position: sticky; top: 0; background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 8px 16px; z-index: 20;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .section-nav a {
      padding: 4px 12px; border-radius: 4px; font-size: 13px;
      text-decoration: none; color: var(--text-secondary);
      border: 1px solid var(--border-color); white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .section-nav a:hover { background: var(--bg-hover); color: var(--text-primary); }
    .section-nav a.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

    /* ── Top bar with Save All ──────────────────────────────────────────────── */
    .ea-topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 0 12px 0;
    }
    .ea-topbar-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Section divider ────────────────────────────────────────────────────── */
    .doc-section-divider {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin: 0;
      border-top: 2px solid var(--border-color);
      background: var(--bg-secondary, #f8fafc);
      font-size: 13px; color: var(--text-secondary);
      position: relative;
    }
    .doc-section:first-child .doc-section-divider { border-top: none; }
    .doc-section-divider h3 {
      margin: 0; font-size: 0.9rem; font-weight: 600;
      color: var(--text-primary); white-space: nowrap;
    }
    .doc-section-divider .section-actions {
      margin-left: auto; display: flex; gap: 6px; align-items: center;
    }
    .doc-section-divider .readonly-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: rgba(0,0,0,.06); color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 4px;
    }

    /* ── Action dropdown ────────────────────────────────────────────────────── */
    .section-action-trigger {
      background: none; border: 1px solid var(--border-color); border-radius: 6px;
      padding: 4px 8px; cursor: pointer; font-size: 16px; color: var(--text-secondary);
      line-height: 1; display: inline-flex; align-items: center;
    }
    .section-action-trigger:hover { background: var(--bg-hover); color: var(--text-primary); }
    .section-action-dropdown {
      position: absolute; right: 16px; top: 100%; margin-top: 4px;
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      padding: 6px 0; z-index: 30; min-width: 180px;
      animation: popoverFadeIn 0.15s ease;
    }
    @keyframes popoverFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section-action-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text-primary); white-space: nowrap;
    }
    .section-action-item:hover { background: var(--bg-hover); }
    .section-action-item svg { flex-shrink: 0; }
    .section-action-item--blue { color: var(--accent-blue); }
    .section-action-item--green { color: #16a34a; }
    .section-action-item--red { color: #dc2626; }
    .section-action-item--orange { color: var(--accent-orange); }
    .section-action-item--purple { color: #7c3aed; }

    /* ── Continuous document — seamless editors ──────────────────────────────── */
    .doc-flow {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .doc-section .gcp-re-wrap,
    .doc-section .gcp-editor-root {
      border: none !important; border-radius: 0 !important; box-shadow: none !important;
    }
    /* Hide per-section toolbars by default; show only on focus */
    .doc-section .gcp-re-toolbar {
      display: none;
    }
    .doc-section.focused .gcp-re-toolbar {
      display: flex;
      position: sticky; top: 42px; z-index: 15;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
    }
    .doc-section .gcp-re-body { min-height: 40px; }

    /* Read-only sections subtle tint */
    .doc-section--readonly .gcp-re-body {
      background: var(--bg-secondary, #f8f9fa);
    }

    /* Save All button styling — reuse pill button pattern */
    .btn-save-all {
      padding: 6px 16px; background: none; color: var(--accent-blue);
      border: 1.5px solid currentColor; border-radius: 999px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-primary); letter-spacing: 0.3px;
    }
    .btn-save-all:hover { color: #2563eb; }
    .btn-save-all:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 980px) {
      .section-nav { gap: 6px; padding: 6px 10px; }
      .section-nav a { font-size: 11px; padding: 3px 8px; }
      .doc-section-divider { padding: 8px 10px; flex-wrap: wrap; }
      .ea-topbar { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="ea-topbar">
        <div class="page-title" id="pageTitle">All Sections</div>
        <div class="ea-topbar-actions">
          <button class="btn-save-all" id="btnSaveAll">Save All</button>
          <button class="btn btn-outline" id="btnBack">Back to Dashboard</button>
        </div>
      </div>

      <div class="section-nav" id="sectionNav"></div>
      <div class="doc-flow" id="docFlow"></div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/dialog.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/core/editor.js"></script>
  <script src="/js/pages/editor-all.js"></script>
</body>
</html>
