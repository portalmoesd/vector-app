<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vector Portal — Change Password</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/georgian-fonts.css" />
    <link rel="stylesheet" href="/css/apple.css" />
    <style>
      .change-pw-container {
        max-width: 400px;
        margin: 80px auto;
        padding: 0 20px;
      }
      .change-pw-container .card {
        padding: 32px;
      }
      .change-pw-container h2 {
        margin-bottom: 8px;
      }
      .change-pw-container p {
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="change-pw-container">
      <div class="card">
        <h2>Change Password</h2>
        <p>Your password must be changed before continuing.</p>

        <div id="errorMsg" class="msg msg-error" style="display: none"></div>
        <div id="successMsg" class="msg msg-success" style="display: none"></div>

        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input class="form-input" type="password" id="currentPw" />
        </div>
        <div class="form-group">
          <label class="form-label">New Password (min 6 chars)</label>
          <input class="form-input" type="password" id="newPw" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-input" type="password" id="confirmPw" />
        </div>
        <button class="btn btn-primary" id="changePwBtn" style="width: 100%; justify-content: center">
          Change Password
        </button>
      </div>
    </div>

    <script src="/js/core/config.js"></script>
    <script src="/js/core/api.js"></script>
    <script src="/js/pages/change-password.js"></script>
  </body>
</html>
