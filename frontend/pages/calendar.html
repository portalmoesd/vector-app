<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Events</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <style>
    .event-tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      border-bottom: 2px solid var(--border, var(--border-color));
    }
    .event-tab {
      padding: 10px 20px; border: none; background: none;
      font-size: 14px; font-weight: 700; color: var(--muted, var(--text-secondary));
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; border-radius: 0;
      transition: color .18s ease;
    }
    .event-tab:hover { color: var(--text, var(--text-primary)); }
    .event-tab.active {
      color: var(--primary, var(--accent-blue));
      border-bottom-color: var(--primary, var(--accent-blue));
    }

    .filter-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end;
    }
    .filter-bar .form-group { margin-bottom: 0; flex: 1; min-width: 160px; max-width: 250px; }
    .filter-bar .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .pagination button {
      padding: 8px 16px;
      border: 1px solid var(--border, var(--border-color));
      background: rgba(255,255,255,.72);
      color: var(--text, var(--text-primary));
      border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 600;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .pagination button:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
    .pagination button.active {
      background: linear-gradient(180deg, var(--primary, var(--accent-blue)), var(--primary-2, var(--accent-blue)));
      color: #fff;
      border-color: rgba(10,132,255,.55);
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .event-card + .event-card { margin-top: 12px; }
    .event-card-info h4 { margin: 0 0 4px 0; font-size: 1rem; font-weight: 900; }
    .event-card-meta { font-size: 12px; color: var(--muted, var(--text-secondary)); display: flex; gap: 12px; flex-wrap: wrap; }
    .event-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar" style="display:flex;justify-content:space-between;align-items:center;">
        <div class="page-title">Events</div>
        <button class="btn btn-primary" id="createEventBtn" style="display:none;">+ Create Event</button>
      </div>

      <div class="event-tabs">
        <button class="event-tab active" data-tab="upcoming">Upcoming</button>
        <button class="event-tab" data-tab="past">Past Events</button>
      </div>

      <div class="filter-bar">
        <div class="form-group">
          <label class="form-label">Search</label>
          <input class="form-input" id="filterKeyword" placeholder="Title or occasion..." />
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <select class="form-select" id="filterCountry"><option value="">All countries</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">From</label>
          <input class="form-input" type="date" id="filterDateFrom" />
        </div>
        <div class="form-group">
          <label class="form-label">To</label>
          <input class="form-input" type="date" id="filterDateTo" />
        </div>
      </div>

      <div id="eventsList"></div>
      <div class="pagination" id="pagination"></div>

      <!-- My Templates section -->
      <div class="card" id="templatesCard" style="margin-top:32px;display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3>My Templates</h3>
          <button class="btn btn-primary" id="createTemplateBtn">+ New Template</button>
        </div>
        <div id="templatesContainer">
          <div class="empty-state"><p>No templates yet</p></div>
        </div>
      </div>

      <!-- Create / View / Edit Event Modal -->
      <div id="eventModal" class="modal-overlay" style="display:none;">
        <div class="modal-card" style="max-width:900px;max-height:90vh;display:flex;flex-direction:column;">
          <h3 id="eventModalTitle" style="flex-shrink:0;">Create Event</h3>
          <div id="eventModalBody" style="overflow-y:auto;flex:1;min-height:0;padding-right:8px;"></div>
          <div class="modal-footer" style="flex-shrink:0;">
            <button class="btn btn-outline" id="eventModalCancel">Cancel</button>
            <button class="btn btn-primary" id="eventModalSave">Create</button>
          </div>
        </div>
      </div>

      <!-- Template Modal -->
      <div class="modal-overlay" id="templateModal" style="display:none;">
        <div class="modal-card" style="max-width:1100px;max-height:90vh;display:flex;flex-direction:column;overflow:visible;">
          <h3 id="templateModalTitle" style="flex-shrink:0;">Create Template</h3>
          <div id="templateModalBody" style="overflow-y:auto;flex:1;min-height:0;padding-right:8px;"></div>
          <div class="modal-footer" style="flex-shrink:0;">
            <button class="btn btn-outline" id="templateModalCancel">Cancel</button>
            <button class="btn btn-primary" id="templateModalSave">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/pages/calendar.js"></script>
  <script src="/js/pages/calendar-templates.js"></script>
</body>
</html>
