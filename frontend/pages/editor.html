<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Section Editor</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    .editor-toolbar {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .editor-toolbar button {
      padding: 6px 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      border-radius: 4px; cursor: pointer; font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .editor-toolbar button:hover { background: var(--hover); }
    .editor-toolbar button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .editor-toolbar button.success { background: var(--success); color: #fff; border-color: var(--success); }
    .editor-toolbar button.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .editor-toolbar button.warning { background: var(--warning); color: #fff; border-color: var(--warning); }
    .editor-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

    .editor-content {
      min-height: 400px; border: 1px solid var(--border);
      border-radius: 6px; padding: 24px;
      background: var(--surface); color: var(--text);
      font-family: 'FiraGO', 'Noto Sans Georgian', Arial, sans-serif;
      font-size: 14px; line-height: 1.7;
      outline: none; overflow-y: auto;
    }
    .editor-content:focus { border-color: var(--primary); }
    .editor-content[contenteditable="false"] { opacity: 0.8; background: var(--surface-alt, var(--surface)); }

    .format-toolbar {
      display: flex; gap: 4px; padding: 6px 0;
      border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .format-toolbar button {
      width: 32px; height: 32px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      border-radius: 4px; cursor: pointer; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    .format-toolbar button:hover { background: var(--hover); }
    .format-toolbar select {
      padding: 4px 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      border-radius: 4px; font-size: 12px;
    }

    .section-meta {
      display: flex; gap: 16px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .section-meta .status { font-weight: 600; }

    .history-panel {
      margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px;
    }
    .history-panel h4 { margin-bottom: 8px; }
    .history-entry {
      padding: 6px 0; border-bottom: 1px solid var(--border-light, var(--border));
      font-size: 13px; display: flex; gap: 8px;
    }
    .history-entry .time { color: var(--text-muted); min-width: 130px; }
    .history-entry .action { font-weight: 500; }

    .comments-panel {
      margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px;
    }
    .comment-card {
      background: var(--surface-alt, var(--surface)); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; margin-bottom: 8px;
    }
    .comment-card .comment-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .comment-form { display: flex; gap: 8px; margin-top: 8px; }
    .comment-form textarea { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 4px; resize: vertical; min-height: 40px; background: var(--surface); color: var(--text); }
    .comment-form button { padding: 8px 16px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" id="editorTitle">Section Editor</div>
      </div>

      <div class="section-meta" id="sectionMeta"></div>

      <div class="card">
        <div class="editor-toolbar" id="actionToolbar"></div>

        <div class="format-toolbar" id="formatToolbar">
          <button onclick="document.execCommand('bold')" title="Bold"><b>B</b></button>
          <button onclick="document.execCommand('italic')" title="Italic"><i>I</i></button>
          <button onclick="document.execCommand('underline')" title="Underline"><u>U</u></button>
          <span style="border-left:1px solid var(--border); margin: 0 4px;"></span>
          <button onclick="document.execCommand('insertUnorderedList')" title="Bullet list">&#8226;</button>
          <button onclick="document.execCommand('insertOrderedList')" title="Numbered list">1.</button>
          <span style="border-left:1px solid var(--border); margin: 0 4px;"></span>
          <select onchange="document.execCommand('fontName', false, this.value)">
            <option value="FiraGO">FiraGO</option>
            <option value="Arial">Arial</option>
            <option value="Calibri">Calibri</option>
            <option value="Noto Sans Georgian">Noto Sans Georgian</option>
            <option value="Sylfaen">Sylfaen</option>
          </select>
          <select onchange="document.execCommand('fontSize', false, this.value)">
            <option value="3">Normal</option>
            <option value="1">Small</option>
            <option value="5">Large</option>
            <option value="7">Huge</option>
          </select>
        </div>

        <div class="editor-content" id="editorContent" contenteditable="true"></div>
      </div>

      <!-- Files section -->
      <div class="card" id="filesPanel" style="display:none;">
        <h4>Files</h4>
        <div id="filesList" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="file" id="fileUploadInput" multiple style="font-size:13px;" />
        </div>
      </div>

      <!-- Comments section -->
      <div class="card comments-panel" id="commentsPanel">
        <h4>Comments</h4>
        <div id="commentsList"></div>
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Add a comment..."></textarea>
          <button class="action-btn primary" id="addCommentBtn">Add</button>
        </div>
      </div>

      <!-- History section -->
      <div class="card history-panel" id="historyPanel">
        <h4>History</h4>
        <div id="historyList"></div>
      </div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/pages/editor.js"></script>
</body>
</html>
