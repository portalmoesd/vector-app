<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Section Editor</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <link rel="stylesheet" href="/css/editor.css" />
  <style>
    .editor-toolbar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border-color);
      margin-bottom: 16px;
    }
    .tb-spacer { flex: 1; }
    .editor-toolbar button {
      padding: 4px 14px; background: none; color: #475569;
      border: 1.5px solid currentColor; border-radius: 999px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-primary); letter-spacing: 0.3px;
    }
    .editor-toolbar button:hover { color: #1e293b; }
    .editor-toolbar button.tb-outline--blue { color: var(--accent-blue); }
    .editor-toolbar button.tb-outline--blue:hover { color: #2563eb; }
    .editor-toolbar button.tb-outline--green { color: #16a34a; }
    .editor-toolbar button.tb-outline--green:hover { color: #15803d; }
    .editor-toolbar button.tb-outline--red { color: #dc2626; }
    .editor-toolbar button.tb-outline--red:hover { color: #b91c1c; }
    .editor-toolbar button.tb-outline--orange { color: var(--accent-orange); }
    .editor-toolbar button.tb-outline--orange:hover { color: #b45309; }
    .editor-toolbar button.tb-outline--purple { color: #7c3aed; }
    .editor-toolbar button.tb-outline--purple:hover { color: #6d28d9; }
    .editor-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

    .section-meta {
      display: flex; gap: 16px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .section-meta .status { font-weight: 600; }

    .history-panel { margin-top: 24px; }
    .history-panel h4 { margin-bottom: 8px; }
    .history-entry {
      padding: 6px 0; border-bottom: 1px solid var(--border-color);
      font-size: 13px; display: flex; gap: 8px;
    }
    .history-entry .time { color: var(--text-muted); min-width: 130px; }
    .history-entry .action { font-weight: 500; }

    .comments-panel { margin-top: 24px; }
    .comment-card {
      background: var(--bg-hover); border: 1px solid var(--border-color);
      border-radius: 6px; padding: 10px 14px; margin-bottom: 8px;
    }
    .comment-card .comment-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .comment-form { display: flex; gap: 8px; margin-top: 8px; }
    .comment-form textarea { flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; resize: vertical; min-height: 40px; background: var(--bg-input); color: var(--text-primary); font-family: var(--font-primary); }
    .comment-form button { padding: 8px 16px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" id="editorTitle">Section Editor</div>
      </div>

      <div class="section-meta" id="sectionMeta"></div>

      <div class="card" style="padding:0;">
        <div class="editor-toolbar" id="actionToolbar" style="padding:8px 16px;margin-bottom:0;"></div>
        <!-- GCP.RichEditor renders here -->
        <div id="richEditorContainer"></div>
      </div>

      <!-- Files section -->
      <div class="card" id="filesPanel" style="display:none;">
        <h4>Files</h4>
        <div id="filesList" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="file" id="fileUploadInput" multiple style="font-size:13px;" />
        </div>
      </div>

      <!-- Comments section -->
      <div class="card comments-panel" id="commentsPanel">
        <h4>Comments</h4>
        <div id="commentsList"></div>
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Add a comment..."></textarea>
          <button class="action-btn primary" id="addCommentBtn">Add</button>
        </div>
      </div>

      <!-- History section -->
      <div class="card history-panel" id="historyPanel">
        <h4>History</h4>
        <div id="historyList"></div>
      </div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/core/editor.js"></script>
  <script src="/js/pages/editor.js"></script>
</body>
</html>
