<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Section Editor</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <link rel="stylesheet" href="/css/editor.css" />
  <style>
    .editor-toolbar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border-color);
      margin-bottom: 16px;
    }
    .tb-spacer { flex: 1; }
    .editor-toolbar button {
      padding: 4px 14px; background: none; color: #475569;
      border: 1.5px solid currentColor; border-radius: 999px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-primary); letter-spacing: 0.3px;
    }
    .editor-toolbar button:hover { color: #1e293b; }
    .editor-toolbar button.tb-outline--blue { color: var(--accent-blue); }
    .editor-toolbar button.tb-outline--blue:hover { color: #2563eb; }
    .editor-toolbar button.tb-outline--green { color: #16a34a; }
    .editor-toolbar button.tb-outline--green:hover { color: #15803d; }
    .editor-toolbar button.tb-outline--red { color: #dc2626; }
    .editor-toolbar button.tb-outline--red:hover { color: #b91c1c; }
    .editor-toolbar button.tb-outline--orange { color: var(--accent-orange); }
    .editor-toolbar button.tb-outline--orange:hover { color: #b45309; }
    .editor-toolbar button.tb-outline--purple { color: #7c3aed; }
    .editor-toolbar button.tb-outline--purple:hover { color: #6d28d9; }
    .editor-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 980px) {
      .editor-toolbar { gap: 6px; padding: 8px 10px; }
      .tb-spacer { flex-basis: 100%; height: 0; }
      .editor-toolbar button { font-size: 0.72rem; padding: 4px 10px; }
      .card { overflow-x: auto; }
      #richEditorContainer { min-width: 0; max-width: 100%; overflow-x: auto; }
    }

    .section-meta {
      display: flex; gap: 12px; align-items: center;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .status-pill {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: rgba(255,255,255,.70);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .status-pill.status-draft { color: #64748b; }
    .status-pill.status-submitted { color: var(--accent-blue); }
    .status-pill.status-returned { color: var(--accent-red); }
    .status-pill.status-approved { color: var(--accent-green); }

    .history-panel { margin-top: 24px; }
    .history-panel h4 { margin-bottom: 12px; }

    /* Timeline layout */
    .sh-timeline {
      display: flex; flex-direction: column; gap: 0; position: relative;
    }
    .sh-timeline::before {
      content: ''; position: absolute; left: 15px; top: 8px; bottom: 8px;
      width: 2px; background: rgba(0,0,0,.08); border-radius: 2px;
    }

    /* Stage rows */
    .sh-stage {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 6px 0; position: relative;
    }
    .sh-dot {
      flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%;
      margin-top: 4px; margin-left: 11px; position: relative; z-index: 1;
      background: #22c55e; border: 2px solid #fff; box-shadow: 0 0 0 1px #22c55e;
    }
    .sh-body { flex: 1; min-width: 0; }
    .sh-stage-label {
      font-size: 13px; font-weight: 700; letter-spacing: .04em;
      color: #374151; margin-bottom: 4px; text-transform: uppercase; line-height: 1.3;
    }
    .sh-events { display: flex; flex-direction: column; gap: 2px; margin-top: 1px; }
    .sh-event {
      display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
      font-size: 13px; color: #6b7280;
    }
    .sh-actor { font-weight: 600; color: #1f2937; }
    .sh-action-tag {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 13px; font-weight: 700; letter-spacing: .02em; white-space: nowrap;
    }
    .sh-date { color: #9ca3af; font-size: 13px; }
    .sh-return-details { display: inline-block; vertical-align: baseline; }
    .sh-return-details > summary {
      list-style: none; display: inline-block; cursor: pointer;
      padding: 2px 10px; border-radius: 99px;
      font-size: 13px; font-weight: 700; letter-spacing: .02em;
      background: #fee2e2; color: #b91c1c; user-select: none;
    }
    .sh-return-details > summary::-webkit-details-marker { display: none; }
    .sh-return-details > summary::after { content: " \25BE"; font-size: 9px; }
    .sh-return-details[open] > summary::after { content: " \25B4"; }
    .sh-return-note {
      margin-top: 5px; padding: 6px 10px;
      background: rgba(185,28,28,.07); border-left: 3px solid #f87171;
      border-radius: 0 6px 6px 0;
      font-size: 12px; color: #7f1d1d; line-height: 1.4; word-break: break-word;
    }
    .sh-return-note__empty { color: #9ca3af; font-style: italic; }
    .sh-return-details--ask > summary { background: #fef3c7; color: #92400e; }
    .sh-return-details--ask .sh-return-note {
      background: rgba(217,119,6,.07); border-left-color: #fbbf24; color: #713f12;
    }

  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" id="editorTitle">Section Editor</div>
      </div>

      <div class="section-meta" id="sectionMeta"></div>

      <div class="card" style="padding:0; max-width:100%; overflow:hidden;">
        <div class="editor-toolbar" id="actionToolbar" style="padding:8px 16px;margin-bottom:0;"></div>
        <!-- GCP.RichEditor renders here -->
        <div id="richEditorContainer" style="max-width:100%; overflow-x:auto;"></div>
      </div>

      <!-- Files section -->
      <div class="card" id="filesPanel" style="display:none;">
        <h4>Files</h4>
        <div id="filesList" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="file" id="fileUploadInput" multiple style="font-size:13px;" />
        </div>
      </div>

      <!-- History section -->
      <div class="card history-panel" id="historyPanel">
        <h4>History</h4>
        <div id="historyList"></div>
      </div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/core/editor.js"></script>
  <script src="/js/pages/editor.js"></script>
</body>
</html>
