<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Library</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <style>
    .filter-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end;
    }
    .filter-bar .form-group { margin-bottom: 0; flex: 1; min-width: 160px; max-width: 250px; }
    .filter-bar .form-label { font-size: 0.75rem; }

    .doc-card {
      border: 1px solid var(--border-color); border-radius: var(--radius-lg);
      padding: 16px 20px; margin-bottom: 12px; background: var(--bg-card);
      display: flex; justify-content: space-between; align-items: center;
    }
    .doc-card-info h4 { margin: 0 0 4px 0; font-size: 1rem; }
    .doc-card-meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 16px; }
    .doc-card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .preview-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .preview-card {
      background: var(--bg-card); border-radius: var(--radius-lg);
      width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto;
      padding: 32px; box-shadow: var(--shadow-lg);
    }
    .preview-card .section-block { margin-bottom: 24px; }
    .preview-card .section-block h3 {
      font-size: 0.95rem; border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px; margin-bottom: 12px;
    }
    .preview-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 12px;
    }
    .preview-header h2 { margin: 0; font-size: 1.1rem; }
    .preview-close {
      background: none; border: none; font-size: 24px;
      cursor: pointer; color: var(--text-secondary); padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title">Library</div>
      </div>

      <div class="filter-bar">
        <div class="form-group">
          <label class="form-label">Search</label>
          <input class="form-input" id="filterKeyword" placeholder="Title..." />
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <select class="form-select" id="filterCountry"><option value="">All</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">From</label>
          <input class="form-input" type="date" id="filterDateFrom" lang="en-GB" />
        </div>
        <div class="form-group">
          <label class="form-label">To</label>
          <input class="form-input" type="date" id="filterDateTo" lang="en-GB" />
        </div>
      </div>

      <div id="libraryList"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="/js/docx-export.js"></script>
  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/pages/library.js"></script>
</body>
</html>
