<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Deputy Dashboard</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <link rel="stylesheet" href="/css/dashboard-pipeline.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" data-i18n="dashboard.deputyTitle">Deputy Dashboard</div>
      </div>

      <div class="card dp-event-card">
        <h3 class="dp-event-card__title" data-i18n="dashboard.eventTitle">Event</h3>
        <p class="dp-event-card__desc" data-i18n="dashboard.descDeputy">Choose an event to review and finalize before sending to the library.</p>
        <div class="dp-event-card__row">
          <div class="dp-event-card__select-wrap">
            <label class="dp-event-card__label" data-i18n="dashboard.eventTitle">Event</label>
            <select id="eventSelect" class="form-select">
              <option value="" data-i18n="dashboard.selectEventPlaceholder">Select event...</option>
            </select>
          </div>
          <button class="btn btn-outline dp-preview-btn" id="previewBtn" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span data-i18n="dashboard.preview">PREVIEW</span>
          </button>
        </div>
        <div id="eventDetails" style="display:none;"></div>
      </div>
      <div id="sectionsCard" style="display:none;"></div>

      <div class="card dp-upcoming-card">
        <h3 class="dp-upcoming-card__title" data-i18n="dashboard.upcomingEvents">Upcoming events</h3>
        <div class="dp-upcoming-layout">
          <div class="dp-calendar" id="miniCalendar"></div>
          <div class="dp-upcoming-list" id="upcomingList">
            <div class="empty-state"><p data-i18n="dashboard.noUpcoming">No upcoming events</p></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/dialog.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/pages/dashboard-pipeline.js"></script>
</body>
</html>
