<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Admin Panel</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar"></aside>
    <main class="main">
      <div class="topbar">
        <div class="page-title" data-i18n="nav.admin">Admin Panel</div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="departments">Departments</button>
        <button class="admin-tab" data-tab="users">Users</button>
        <button class="admin-tab" data-tab="links">Deputy–Supervisor Links</button>
      </div>

      <!-- Departments Tab -->
      <div class="admin-panel" id="tab-departments">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3>Departments</h3>
            <button class="btn btn-primary" id="addDeptBtn">+ Add Department</button>
          </div>
          <div id="deptList"><div class="empty-state"><p>Loading...</p></div></div>
        </div>
      </div>

      <!-- Users Tab -->
      <div class="admin-panel" id="tab-users" style="display:none;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3>Users</h3>
            <button class="btn btn-primary" id="addUserBtn">+ Add User</button>
          </div>
          <div id="userList"><div class="empty-state"><p>Loading...</p></div></div>
        </div>
      </div>

      <!-- Links Tab -->
      <div class="admin-panel" id="tab-links" style="display:none;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3>Deputy–Supervisor Links</h3>
            <button class="btn btn-primary" id="addLinkBtn">+ Add Link</button>
          </div>
          <div id="linksList"><div class="empty-state"><p>Loading...</p></div></div>
        </div>
      </div>

      <!-- Modal overlay -->
      <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
          <h3 id="modalTitle"></h3>
          <div id="modalBody"></div>
          <div class="modal-footer">
            <button class="btn btn-outline" id="modalCancel">Cancel</button>
            <button class="btn btn-primary" id="modalSave">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/core/app.js"></script>
  <script src="/js/pages/admin.js"></script>
</body>
</html>
