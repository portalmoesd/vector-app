<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Portal — Login</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/georgian-fonts.css" />
  <link rel="stylesheet" href="/css/apple.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .login-logo img { width: 40px; height: 40px; }
    .login-logo span { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); }
    .login-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    #loginError {
      display: none;
      margin-bottom: 12px;
    }
    .login-card .btn { width: 100%; justify-content: center; padding: 12px; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/portal-logo-new.svg" alt="Logo" />
      <span>Vector Portal</span>
    </div>
    <div class="login-title" data-i18n="auth.login">Log In</div>
    <div id="loginError" class="msg msg-error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" data-i18n="auth.username">Username</label>
        <input class="form-input" type="text" id="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="auth.password">Password</label>
        <input class="form-input" type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary" data-i18n="auth.loginButton">Sign In</button>
    </form>
  </div>
  <script src="/js/core/config.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/utils.js"></script>
  <script src="/js/pages/login.js"></script>
</body>
</html>
